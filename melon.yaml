과거 두 차례의 AI 겨울을 통해 기술적 근거 없는 낙관론의 위험성을 깨달았고, 2017년 트랜스포머 아키텍처와 2024년 o1 추론 모델의 등장이 현재 에이전트 시대의 강력한 기술적 토대가 되었음을 이해했습니다.
특히 2026년 현재는 단순한 생성 단계를 넘어 AI가 스스로 계획하고 실행하는 \'AI 실행(AI Execution)의 시대\'임을 체감하고 있습니다. 
Anthropic의 MCP와 같은 표준 프로토콜을 통해 멀티 에이전트 시스템이 실전 배치되는 과정을 지켜보며, 이제는 모델 자체의 성능만큼이나 시스템 간의 연결성과 비용 효율적인 소형 언어모델(SLM) 활용 능력이 중요함을 배웠습니다. 
인턴으로서 자율 기업으로 향하는 이 결정적인 시기에 실용적이고 안정적인 에이전트 운용 역량을 갖춰야 한다는 소명감을 얻었습니다.
Transformer 아키텍처의 구조와 핵심 원리를 정리하는 보고서를 작성하였다. 먼저 기존 RNN·CNN 기반 시퀀스 모델의 한계를 분석하고, 
이를 보완하는 self-attention 중심 구조의 특징을 정리하였다. 이어서 인코더-디코더 구성, 멀티헤드 어텐션, positional encoding, FFN, 학습 설정과 실험 결과를 단계적으로 정리하며 Transformer의 성능적 강점과 의의를 분석하였다. 
마지막으로 해당 구조가 BERT, GPT 등 최신 대형 언어모델의 기반이 되었다는 점까지 연결하여 전체 내용을 체계적으로 정리하였다.
Langflow의 전체 동작 원리를 학습하는 데 집중하였다. 각 컴포넌트가 어떤 역할을 하는지 확인하면서 입력 데이터가 프롬프트, 임베딩, 벡터 저장소, 모델 응답으로 이어지는 흐름을 단계적으로 이해하였다. 
또한 노드 간 연결 구조와 데이터 전달 방식, RAG 파이프라인이 구성되는 원리를 정리하며 실제 챗봇 구현을 위한 기초를 다졌다. 이후 문서 기반 질의응답 시스템 구현을 염두에 두고 텍스트 분할, 검색, 답변 생성 과정이 어떻게 연결되는지 중심으로 학습하였다.Langflow를 활용해 갤럭시 S26 관련 정보를 제공하는 문서 기반 챗봇을 구현하였다. 
문서 업로드부터 텍스트 분할, 임베딩 생성, FAISS 벡터 저장소 구축, 유사 문맥 검색, 프롬프트 구성, Ollama 기반 답변 생성까지 전체 RAG 흐름을 직접 설계하고 연결하였다. 또한 질문과 문맥의 표현이 완전히 일치하지 않아도 의미가 유사하면 답변할 수 있도록 프롬프트를 조정해 실사용성을 높였으며, 로컬 환경에서 안정적으로 동작하도록 설정을 점검하였다.
팀별로 최적의 RAG 시스템을 설계하고 구현하는 프로젝트를 진행하였다. 우리 팀은 검색 정확도와 응답 품질을 높이는 방향으로 역할을 나누어 실험을 진행했으며, 
나는 문서 메타데이터를 AI를 활용해 생성하는 작업을 맡았다. 문서 내용에서 핵심 주제와 속성을 추출해 메타데이터로 정리하는 방식을 검토하고, 
이를 검색 단계에서 더 효과적으로 활용할 수 있도록 구조를 구상하였다. 이를 통해 단순 본문 검색보다 문서 특성을 반영한 검색이 가능하도록 방향을 잡았고, 
RAG 성능 개선에 필요한 메타데이터 활용 방안을 학습하였다.회사 내 AX 교육이 시작된 첫날로, 사내 업무 환경과 시스템을 익히는 시간을 가졌다. 
외부 환경과 달리 사내에서는 보안과 운영상의 이유로 사용 가능한 시스템과 도구에 여러 제약이 있었기 때문에, 주어진 환경 안에서 어떤 기능을 활용할 수 있는지 직접 확인해 보았다. 
특히 제한된 시스템 구조와 사용 방식, 접근 가능한 기능들을 하나씩 살펴보며 업무 적용 가능성을 파악하는 데 집중하였다. 
이를 통해 이후 실습과 과제 수행에 필요한 기본 환경을 이해하고 적응하는 시간을 가졌다.사내 환경에서 처음으로 공공데이터를 활용한 EDA 작업을 진행하였다. 
외부에서 사용하던 AI 시스템에 비해 사내 AI 환경은 기능적으로 다소 제한이 있어, 이전보다 스스로 데이터를 해석하고 분석 방향을 설정하는 데 더 많이 집중하게 되었다.
처음에는 다소 불편하게 느껴졌지만, 오히려 그 과정에서 문제를 직접 고민하고 해결하는 힘을 기를 수 있었다. 
또한 AI에 전적으로 의존하기보다는 필요한 부분에서 보조적으로 활용하면서, AI를 주도적으로 사용하는 더 바람직한 협업 방식에 대해 생각해볼 수 있었던 의미 있는 시간이었다.
LangFlow 환경인 Agent를 활용해 RAG를 구현하는 실습을 진행하였다. 지금까지 수행했던 과제 결과물들을 하나의 지식 기반으로 정리해, 
이를 활용하는 개인 Agent를 만드는 작업을 수행하였다. 이전에도 유사한 RAG 구성을 경험한 적이 있어 기본 구현 자체보다는 다양한 노드의 기능을 직접 적용해 보고, 
각 노드가 전체 흐름에서 어떤 역할을 하는지 확인하는 데 더 집중하였다. 이를 통해 단순한 연결을 넘어서 Agent 구조를 보다 유연하게 설계하는 방법을 익힐 수 있었고, 
실제 업무에 맞게 확장할 수 있는 가능성도 함께 살펴볼 수 있었다.실제 회사 내부 공정 데이터를 분석하는 팀별 활동을 진행하였다. 
처음 접하는 공정명과 측정값이 많아 각 항목의 의미를 파악하고 데이터의 흐름을 이해하는 과정이 쉽지 않았다. 특히 AX 교육의 마지막 과제인 만큼 앞선 실습보다 훨씬 높은 난이도를 체감했고, 문제를 정의하는 것부터 많은 고민이 필요했다. 
그러나 막막한 상황 속에서도 단순히 정해진 방식만 따르기보다 새로운 관점으로 접근하는 태도가 중요하다는 점을 느꼈다. 
이를 통해 경쟁력은 익숙한 틀 안에 머무르지 않고 스스로 해석하고 확장하는 힘에서 나온다는 것을 배울 수 있었다.3주간 진행된 AX 교육을 마무리하며 마지막 프로젝트 발표를 진행하고, 그동안의 학습 내용과 과제 수행 과정을 정리한 최종 보고서를 제출하였다. 
짧지 않은 기간 동안 다양한 실습과 프로젝트를 수행하며 AI 활용, 데이터 분석, RAG 설계 등 여러 주제를 경험했다. 
교육 종료 이후 부서 배정을 받아 처음으로 개발실에 방문하였다.첫 출근일로, 업무를 시작하기에 앞서 기본적인 컴퓨터 세팅과 작업 환경 구성에 집중하였다. 
필요한 프로그램과 계정을 점검하고, 이후 업무를 원활하게 수행할 수 있도록 기본 환경을 하나씩 정비하였다. 
또한 새로운 부서 분위기를 파악하고 업무 방식, 소통 분위기를 살펴보는 데에도 신경을 썼다. 본격적인 업무 시작 전 조직과 환경에 익숙해지기 위해 노력한 하루였다.
안드로이드 스튜디오 개발 환경을 설정하는 작업을 진행하였다. 외부 환경에서 사용하던 방식과 달리, 사내 환경에 맞춘 보안 설정과 내부 규정에 따른 절차를 함께 적용해야 해서 익숙하지 않은 과정이 많았다. 
그 과정에서 처음 보는 오류들도 여러 차례 마주하게 되었고, 외부 AI 도구를 자유롭게 활용할 수 없는 환경이라 문제를 해결하는 데 더 많은 시간과 노력이 필요했다. 
다소 고단한 하루였지만, 사내 개발 환경의 특수성과 제약을 직접 경험하며 적응해 가는 의미 있는 시간이었다.부서에서 진행 중인 프로젝트를 직접 빌드해보는 시간을 가졌다. 
학생 때는 개인 환경에 맞춰 비교적 자유롭게 개발을 진행했지만, 실무에서는 팀 전체가 동일한 버전과 설정을 맞춰야 한다는 점이 크게 다르게 느껴졌다. 
이 과정에서 개발 환경, 라이브러리, 빌드 설정의 작은 차이만으로도 여러 오류가 발생해 예상보다 많은 시행착오를 겪었다. 다소 어려움은 있었지만, 
협업 환경에서는 개인 작업보다 공통된 개발 기준과 버전 관리가 얼마나 중요한지 체감할 수 있었던 하루였다.클래스의 의존성과 의존성 주입에 대해 학습하였다. 
코드의 규모가 커지고 클래스 간 연결이 복잡해질수록 수정이나 확장이 어려워져 유지보수 부담이 커지는데, 이를 해결하는 방법으로 의존성 주입 개념을 이해하는 데 집중하였다.
또한 객체를 직접 생성하고 관리하는 방식 대신 필요한 의존성을 외부에서 주입받는 구조가 왜 더 효율적인지 살펴보았고, 이를 지원하는 라이브러리가 실무에서 어떤 장점을 가지는지도 함께 학습하였다. 
이를 통해 코드의 결합도를 낮추고 재사용성과 테스트 용이성을 높이는 구조에 대해 이해할 수 있었다.Jetpack Compose의 기본 위젯들을 학습하였다. 
이전에 Flutter로 프로젝트를 진행한 경험이 있어 UI를 구성하는 방식이나 위젯 중심으로 화면을 설계하는 개념이 비교적 익숙하게 느껴졌다. 
덕분에 새로운 내용을 접하는 데 큰 어려움은 없었고, Compose의 기본 구조와 주요 위젯 사용법을 자연스럽게 이해할 수 있었다. 이를 통해 안드로이드 환경에서 선언형 UI를 어떻게 구성하는지 감을 잡을 수 있었고, 앞으로 화면 구현에 필요한 기초를 다지는 시간을 가졌다.Z 시리즈 개발 과정에서 실제로 발생했던 오류들을 직접 재현해보는 시간을 가졌다. 
완성된 제품이 아니라 개발 단계에 있는 시료폰을 다루면서, 평소 접하던 일반적인 사용 환경과는 다른 개발 현장의 흐름을 가까이에서 경험할 수 있었다. 
단순히 결과만 확인하는 것이 아니라 오류가 어떤 상황에서 발생하는지 직접 살펴보며 문제를 이해하려 노력했고, 이를 통해 제품 개발 과정에 한층 더 녹아들 수 있었다.
실무적인 관점에서 개발과 테스트의 중요성을 체감한 의미 있는 하루였다.Jetpack Compose에서 custom modifier에 대해 학습하였다. 
기본적으로 제공되는 위젯 속성을 그대로 사용하는 것을 넘어, modifier를 직접 커스텀하여 필요한 동작과 표현을 세밀하게 제어하는 방법을 익혔다. 
이를 통해 단순한 UI 구성에서 한 단계 더 나아가, 화면 요소의 특성과 동작을 목적에 맞게 조정할 수 있다는 점을 이해할 수 있었다. 
전반적으로 위젯의 기본 정보를 직접 확장하고 응용하는 방법을 배우며, 보다 높은 수준의 구현 역량을 키울 수 있었던 시간이었다.AX 발표 세미나 준비를 진행하였다. 
이번 발표는 회사 외부에서 활용되는 인공지능 도구와 흐름을 부서원들께 소개하는 내용이어서, 단순히 자료를 정리하는 것을 넘어 최근 동향을 직접 확인하는 데 집중하였다. 
발표 준비 과정에서 최근 트렌드로 주목받는 다양한 AI 도구들을 직접 살펴보고 활용해 보면서, 기술 발전 방향과 실제 활용 방식에 대한 이해를 넓힐 수 있었다. 
이를 통해 최근 인공지능 분야의 경향성을 보다 구체적으로 파악하고, 발표 내용도 한층 현실감 있게 구성할 수 있었다.
비동기 처리를 보다 간결하게 구현할 수 있는 Kotlin Coroutine을 학습하였습니다. suspend 함수의 개념과 CoroutineScope, launch, async 등 주요 빌더의 차이를 이해하고,
Dispatchers를 통해 작업을 Main, IO, Default 스레드에 적절히 분배하는 방식을 실습하였습니다. 기존 콜백 방식과 비교하여 코드 가독성이 크게 향상된다는 점을 직접 확인하였으며, 
ViewModel과 결합한 viewModelScope 활용까지 이어서 학습하였습니다.안드로이드에서 로컬 데이터를 구조적으로 저장하고 관리하기 위한 Room Database를 학습하였습니다.
Entity, DAO, Database 세 가지 핵심 구성요소의 역할과 관계를 이해하고, 어노테이션 기반으로 테이블과 쿼리를 정의하는 방식을 실습하였습니다. 
또한 Coroutine과 연동하여 비동기적으로 데이터를 삽입하고 조회하는 흐름을 구현해보았으며, Flow를 활용해 DB 변경사항이 UI에 자동으로 반영되는 구조까지 확인하였습니다.
AI로 제작된 단편영상 트렌드를 주제로 세미나 자료를 구성하고 부서원들 앞에서 발표를 진행하였습니다. 구독자 70만 채널 사례를 포함하여 AI 영상 제작의 특징과 사람들이 열광하는 이유를 분석하였으며, 
실제 제작 과정을 직접 시연하여 기술의 접근성을 보여주었습니다.UI 상태를 화면 로직과 분리하여 관리하는 ViewModel 패턴을 학습하였습니다. 
StateFlow를 함께 활용하여 데이터 변화에 따라 UI가 자동으로 갱신되는 구조를 이해하고, 간단한 예제를 통해 상태 관리 흐름을 직접 실습하였습니다.AnimatedVisibility와 animateFloatAsState 등 Compose가 제공하는 주요 애니메이션 API를 학습하였습니다. 
선언형 방식으로 상태 변화에 따른 전환 효과를 구현하는 방법을 익히고, 버튼 클릭 시 요소가 나타나고 사라지는 예제를 직접 구현하였습니다.
Layout API를 활용한 커스텀 레이아웃 구현을 학습하고, ConstraintLayout의 Barrier를 활용한 동적 배치를 실습하였습니다. 
이후 placeWithLayer와 rotationZ를 이용해 원형 배열 UI에 회전 및 원근감 효과를 적용하며 Compose의 렌더링 구조를 깊이 이해하였습니다.
팀 프로젝트 주제를 정하기 위해 다양한 아이디어를 조사했다. 최근 예기치 못한 비가 자주 내리는 상황에서 착안해, 날씨 정보를 활용한 앱 개발 아이디어를 구체화했다.
기상 API를 통해 실시간 날씨 데이터를 받아오고, 여기에 AI 기능을 접목하여 사용자에게 더 유용한 정보를 제공하는 방향으로 프로젝트를 진행해보기로 했다. 
앞으로는 기능 범위와 구현 가능성을 검토할 예정이다.팀 프로젝트의 세부 구현 내용을 정리했다. 기존 휴대폰 캘린더는 날짜별 날씨를 단순히 표시해주지만, 
사용자의 일정이 있는 시간대의 날씨를 구체적으로 알려주지는 않는다는 점에 주목했다. 이에 따라 캘린더 일정 시간에 맞춘 날씨 알림 기능을 기획했다. 
또한 사용자의 이동 패턴과 경로를 분석해 이동 중 예상되는 날씨 정보까지 제공하는 방향으로 구현 범위를 설정했다.시료를 활용해 팀 프로젝트의 구현 가능성을 검토했다. 
기상 API와 일정 정보를 연동해 사용자의 스케줄 시간대에 맞는 날씨 정보를 제공하는 기능이 현실적으로 구현 가능한지 확인했다. 
또한 날씨 변화에 따라 화면이 동적으로 바뀌는 UI 구성까지 확장하는 방안도 검토했지만, 프로젝트 기간이 1개월로 제한되어 있어 구현 난이도와 완성도를 고려해 제외하기로 했다.

