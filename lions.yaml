@Composable
fun LockScreen(onUnlock: () -> Unit) {

    var isFloating by remember { mutableStateOf(false) }
    var showShortcutPopup by remember { mutableStateOf(false) }
    var showAppWidgetSheet by remember { mutableStateOf(false) }
    var addedApps by remember { mutableStateOf(listOf<AppItem>()) }

    var clockOffset by remember { mutableStateOf(Offset.Zero) }
    var greenBoxOffset by remember { mutableStateOf(Offset.Zero) }
    var savedClockOffset by remember { mutableStateOf(Offset.Zero) }

    BackHandler(enabled = isFloating) {
        clockOffset = savedClockOffset
        greenBoxOffset = Offset.Zero
        isFloating = false
    }

    val configuration = LocalConfiguration.current
    val screenWidth = configuration.screenWidthDp.dp
    val screenHeight = configuration.screenHeightDp.dp
    val screenBig = if (screenWidth > screenHeight) screenWidth else screenHeight

    val horizontalPadding = screenWidth * 0.05f
    val verticalPadding = screenHeight * 0.05f

    val scale by animateFloatAsState(
        targetValue = if (isFloating) 0.7f else 1f,
        animationSpec = tween(500, easing = FastOutSlowInEasing),
        label = "scale"
    )
    val horizontalPaddingAnim by animateDpAsState(
        targetValue = if (isFloating) horizontalPadding else 0.dp,
        animationSpec = tween(500, easing = FastOutSlowInEasing),
        label = "hPadding"
    )
    val verticalPaddingAnim by animateDpAsState(
        targetValue = if (isFloating) verticalPadding else 0.dp,
        animationSpec = tween(500, easing = FastOutSlowInEasing),
        label = "vPadding"
    )
    val cornerRadius by animateDpAsState(
        targetValue = if (isFloating) 30.dp else 0.dp,
        animationSpec = tween(500, easing = FastOutSlowInEasing),
        label = "corner"
    )

    // blur 반경 애니메이션 (floating 시 점점 흐릿하게)
    val blurRadius by animateDpAsState(
        targetValue = if (isFloating) 20.dp else 0.dp,
        animationSpec = tween(500, easing = FastOutSlowInEasing),
        label = "blur"
    )

    var animationFinished by remember { mutableStateOf(false) }
    LaunchedEffect(scale, horizontalPaddingAnim, verticalPaddingAnim) {
        val scaleTarget = if (isFloating) 0.7f else 1f
        val hpTarget = if (isFloating) horizontalPadding else 0.dp
        val vpTarget = if (isFloating) verticalPadding else 0.dp
        val eps = 0.001f
        animationFinished = abs(scale - scaleTarget) < eps &&
                abs(horizontalPaddingAnim.value - hpTarget.value) < eps &&
                abs(verticalPaddingAnim.value - vpTarget.value) < eps
    }

    Box(modifier = Modifier.fillMaxSize()) {

        // =====================================================
        // [바깥 Box] 흐릿한 배경 이미지 (floating 시 blur)
        // =====================================================
        Image(
            painter = painterResource(id = R.drawable.images),
            contentDescription = null,
            contentScale = ContentScale.Crop,
            modifier = Modifier
                .fillMaxSize()
                .then(
                    // blur()는 API 31+ 에서 동작
                    if (blurRadius > 0.dp) Modifier.blur(blurRadius)
                    else Modifier
                )
        )

        // =====================================================
        // [안쪽 Box] 정상 이미지 + 컨텐츠 (스케일/라운드 애니메이션)
        // =====================================================
        Box(
            modifier = Modifier
                .fillMaxSize()
                .graphicsLayer {
                    scaleX = scale
                    scaleY = scale
                    transformOrigin = TransformOrigin(0.5f, 0.2f)
                }
                .clip(RoundedCornerShape(cornerRadius))
                .pointerInput(Unit) {
                    detectTapGestures(
                        onPress = {
                            val pressStartTime = System.currentTimeMillis()
                            val isReleased = try {
                                withTimeout(500) {
                                    tryAwaitRelease()
                                    true
                                }
                            } catch (e: TimeoutCancellationException) {
                                isFloating = true
                                false
                            }
                            if (!isFloating && isReleased &&
                                System.currentTimeMillis() - pressStartTime >= 500
                            ) {
                                isFloating = true
                            }
                        }
                    )
                }
        ) {
            // 안쪽 정상 배경 이미지
            Image(
                painter = painterResource(id = R.drawable.images),
                contentDescription = null,
                contentScale = ContentScale.Crop,
                modifier = Modifier.fillMaxSize()
            )

            // 컨텐츠 레이어
            Column(
                modifier = Modifier
                    .fillMaxSize()
                    .padding(16.dp),
                horizontalAlignment = Alignment.CenterHorizontally,
                verticalArrangement = Arrangement.SpaceBetween
            ) {
                // 상단: 버튼 + 시계/위젯 + 추가된 앱
                Column(horizontalAlignment = Alignment.CenterHorizontally) {
                    if (isFloating) {
                        Row(
                            modifier = Modifier.fillMaxWidth(),
                            horizontalArrangement = Arrangement.SpaceBetween
                        ) {
                            Button(onClick = { /* TODO: 배경화면 */ }) { Text("배경화면") }
                            Button(onClick = {
                                savedClockOffset = clockOffset
                                greenBoxOffset = Offset.Zero
                                isFloating = false
                            }) { Text("확인") }
                        }
                    } else {
                        Spacer(modifier = Modifier.height(48.dp))
                    }

                    Spacer(modifier = Modifier.height(screenHeight * 0.05f))

                    ClockAndWidget(
                        screenHeight = screenHeight,
                        screenBig = screenBig,
                        modifier = Modifier
                            .offset {
                                IntOffset(clockOffset.x.roundToInt(), clockOffset.y.roundToInt())
                            }
                            .pointerInput(isFloating) {
                                if (isFloating) {
                                    detectDragGestures { change, dragAmount ->
                                        change.consume()
                                        clockOffset += dragAmount
                                    }
                                }
                            }
                    )

                    if (addedApps.isNotEmpty()) {
                        Spacer(modifier = Modifier.height(screenHeight * 0.03f))
                        AddedAppsRow(apps = addedApps)
                    }
                }

                // 하단: 초록색 바
                Box(
                    modifier = Modifier
                        .padding(bottom = screenHeight * 0.05f)
                        .offset {
                            IntOffset(greenBoxOffset.x.roundToInt(), greenBoxOffset.y.roundToInt())
                        }
                        .pointerInput(isFloating) {
                            if (isFloating) {
                                detectDragGestures { change, dragAmount ->
                                    change.consume()
                                    greenBoxOffset += dragAmount
                                }
                            }
                        }
                        .pointerInput(isFloating) {
                            if (isFloating) {
                                detectTapGestures(onTap = { showShortcutPopup = true })
                            }
                        }
                        .clip(RoundedCornerShape(20.dp))
                        .border(
                            width = if (isFloating) 2.dp else 0.dp,
                            color = Color.LightGray,
                            shape = RoundedCornerShape(20.dp)
                        )
                        .height(50.dp)
                        .width(200.dp)
                        .background(Color.Green)
                )
            }
        }

        // 항목 선택 팝업
        if (showShortcutPopup) {
            ShortcutPickerDialog(
                onDismiss = { showShortcutPopup = false },
                onSelect = { selected ->
                    showShortcutPopup = false
                    when (selected) {
                        "app_widget" -> showAppWidgetSheet = true
                        "favorite_app" -> { /* TODO */ }
                        "text" -> { /* TODO */ }
                    }
                }
            )
        }

        // 앱 위젯 바텀시트
        if (showAppWidgetSheet) {
            AppWidgetBottomSheet(
                apps = defaultAppList,
                onDismiss = { showAppWidgetSheet = false },
                onAppSelected = { app ->
                    if (addedApps.none { it.id == app.id }) {
                        addedApps = addedApps + app
                    }
                    showAppWidgetSheet = false
                }
            )
        }
    }
}

// ============================================================
// 항목 선택 다이얼로그
// ============================================================
@Composable
fun ShortcutPickerDialog(
    onDismiss: () -> Unit,
    onSelect: (String) -> Unit
) {
    Dialog(onDismissRequest = onDismiss) {
        Surface(
            shape = RoundedCornerShape(20.dp),
            color = Color.White,
            shadowElevation = 8.dp
        ) {
            Column(
                modifier = Modifier
                    .fillMaxWidth()
                    .padding(20.dp),
                horizontalAlignment = Alignment.CenterHorizontally
            ) {
                Text(
                    text = "추가할 항목 선택",
                    fontSize = 18.sp,
                    fontWeight = FontWeight.Bold,
                    color = Color.Black,
                    modifier = Modifier.padding(bottom = 16.dp)
                )
                Button(
                    onClick = { onSelect("app_widget") },
                    modifier = Modifier.fillMaxWidth().padding(vertical = 4.dp)
                ) { Text("앱 위젯") }
                Button(
                    onClick = { onSelect("favorite_app") },
                    modifier = Modifier.fillMaxWidth().padding(vertical = 4.dp)
                ) { Text("즐겨찾는 앱") }
                Button(
                    onClick = { onSelect("text") },
                    modifier = Modifier.fillMaxWidth().padding(vertical = 4.dp)
                ) { Text("글 넣기") }
                Spacer(modifier = Modifier.height(8.dp))
                TextButton(onClick = onDismiss) { Text("취소") }
            }
        }
    }
}

// ============================================================
// 앱 위젯 바텀시트
// ============================================================
@OptIn(ExperimentalMaterial3Api::class)
@Composable
fun AppWidgetBottomSheet(
    apps: List<AppItem>,
    onDismiss: () -> Unit,
    onAppSelected: (AppItem) -> Unit
) {
    val sheetState = rememberModalBottomSheetState(skipPartiallyExpanded = false)

    ModalBottomSheet(
        onDismissRequest = onDismiss,
        sheetState = sheetState,
        containerColor = Color.White
    ) {
        Column(
            modifier = Modifier
                .fillMaxWidth()
                .padding(horizontal = 16.dp)
                .padding(bottom = 24.dp)
        ) {
            Text(
                text = "앱 선택",
                fontSize = 20.sp,
                fontWeight = FontWeight.Bold,
                color = Color.Black,
                modifier = Modifier.padding(vertical = 12.dp)
            )
            LazyVerticalGrid(
                columns = GridCells.Fixed(4),
                contentPadding = PaddingValues(vertical = 8.dp),
                modifier = Modifier
                    .fillMaxWidth()
                    .heightIn(max = 400.dp)
            ) {
                items(apps) { app ->
                    AppGridItem(app = app, onClick = { onAppSelected(app) })
                }
            }
        }
    }
}

@Composable
fun AppGridItem(app: AppItem, onClick: () -> Unit) {
    Column(
        modifier = Modifier
            .fillMaxWidth()
            .clickable(onClick = onClick)
            .padding(vertical = 12.dp, horizontal = 4.dp),
        horizontalAlignment = Alignment.CenterHorizontally
    ) {
        Box(
            modifier = Modifier
                .size(56.dp)
                .clip(RoundedCornerShape(16.dp))
                .background(app.tint.copy(alpha = 0.15f)),
            contentAlignment = Alignment.Center
        ) {
            Icon(
                imageVector = app.icon,
                contentDescription = app.name,
                tint = app.tint,
                modifier = Modifier.size(30.dp)
            )
        }
        Spacer(modifier = Modifier.height(6.dp))
        Text(
            text = app.name,
            fontSize = 12.sp,
            color = Color.Black,
            textAlign = TextAlign.Center,
            maxLines = 1
        )
    }
}

// ============================================================
// 잠금화면에 추가된 앱 표시 (시계 아래)
// ============================================================
@Composable
fun AddedAppsRow(apps: List<AppItem>) {
    Row(
        modifier = Modifier
            .fillMaxWidth()
            .padding(horizontal = 8.dp),
        horizontalArrangement = Arrangement.spacedBy(12.dp, Alignment.CenterHorizontally)
    ) {
        apps.take(8).forEach { app ->
            Column(horizontalAlignment = Alignment.CenterHorizontally) {
                Box(
                    modifier = Modifier
                        .size(48.dp)
                        .clip(RoundedCornerShape(14.dp))
                        .background(Color.White.copy(alpha = 0.85f)),
                    contentAlignment = Alignment.Center
                ) {
                    Icon(
                        imageVector = app.icon,
                        contentDescription = app.name,
                        tint = app.tint,
                        modifier = Modifier.size(26.dp)
                    )
                }
                Spacer(modifier = Modifier.height(4.dp))
                Text(text = app.name, fontSize = 10.sp, color = Color.White, maxLines = 1)
            }
        }
    }
}

// ============================================================
// 시계 + 미니 위젯
// ============================================================
@Composable
fun ClockAndWidget(
    screenHeight: Dp,
    screenBig: Dp,
    modifier: Modifier = Modifier
) {
    val floatModifier = Modifier
        .clip(RoundedCornerShape(20.dp))
        .border(width = 2.dp, color = Color.LightGray, shape = RoundedCornerShape(20.dp))
        .padding(10.dp)

    Column(modifier = modifier, horizontalAlignment = Alignment.CenterHorizontally) {
        val timeFormat = SimpleDateFormat("hh:mm", Locale.getDefault())
        val currentTime = timeFormat.format(Calendar.getInstance().time)
        Text(text = currentTime, color = Color.White, fontSize = 48.sp, fontWeight = FontWeight.Bold)

        val dateFormat = SimpleDateFormat("EEEE, MMMM dd", Locale.getDefault())
        val currentDate = dateFormat.format(Calendar.getInstance().time)
        Text(
            text = currentDate,
            color = Color.White,
            fontSize = 18.sp,
            modifier = Modifier.padding(top = 8.dp)
        )

        Spacer(modifier = Modifier.height(screenHeight * 0.02f))

        val widgetRowModifier = Modifier
            .clip(RoundedCornerShape(20.dp))
            .border(width = 2.dp, color = Color.LightGray, shape = RoundedCornerShape(20.dp))
            .padding(5.dp)
            .width(screenBig * 0.25f)
            .height(screenHeight * 0.05f)

        Row(modifier = widgetRowModifier, horizontalArrangement = Arrangement.Center) {
            repeat(4) {
                Box(
                    modifier = Modifier
                        .then(floatModifier)
                        .height(screenHeight * 0.035f)
                        .width(screenHeight * 0.035f)
                        .background(Color.Yellow)
                )
            }
        }
    }
}

