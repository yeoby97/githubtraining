class SnowWallpaperService : WallpaperService() {
    override fun onCreateEngine(): Engine = SnowEngine()

    inner class SnowEngine : Engine() {

        private val handler = Handler(Looper.getMainLooper())
        private val paint = Paint().apply {
            color = Color.WHITE
            isAntiAlias = true
        }

        private val particles = mutableListOf<SnowParticle>() // [단계 2] 파티클 리스트

        private val drawRunnable = object : Runnable {        // [단계 3 이전] 드로우 루프
            override fun run() {
                drawFrame()
                handler.postDelayed(this, 16)
            }
        }

        override fun onSurfaceChanged(                        // [단계 2] 화면 크기 확정 시
            holder: SurfaceHolder, format: Int,
            width: Int, height: Int
        ) {
            super.onSurfaceChanged(holder, format, width, height)
            initParticles(width, height)
        }

        override fun onVisibilityChanged(visible: Boolean) {
            super.onVisibilityChanged(visible)
            if (visible) handler.post(drawRunnable)
            else handler.removeCallbacks(drawRunnable)
        }

        override fun onSurfaceDestroyed(holder: SurfaceHolder) {
            super.onSurfaceDestroyed(holder)
            handler.removeCallbacks(drawRunnable)
        }

        private fun initParticles(width: Int, height: Int) { // [단계 2] 파티클 초기화
            particles.clear()
            repeat(100) {
                particles.add(
                    SnowParticle(
                        x      = (0..width).random().toFloat(),
                        y      = (0..height).random().toFloat(),
                        speed  = (2..6).random().toFloat(),
                        radius = (4..12).random().toFloat()
                    )
                )
            }
        }

        private fun drawFrame() {
            val canvas = surfaceHolder.lockCanvas() ?: return
            try {
                canvas.drawColor(Color.BLACK)               // [단계 3] 배경 지우기

                for (p in particles) {                      // [단계 3] 전체 순회
                    p.y += p.speed                          // [단계 3] 위치 업데이트
                    if (p.y > canvas.height) {
                        p.y = 0f
                        p.x = (0..canvas.width).random().toFloat() // [단계 3] 랜덤 리셋
                    }
                    canvas.drawCircle(p.x, p.y, p.radius, paint)   // [단계 3] 그리기
                }
            } finally {
                surfaceHolder.unlockCanvasAndPost(canvas)   // [단계 2] 화면 반영
            }
        }
    }
}