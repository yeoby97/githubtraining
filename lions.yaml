@Composable
fun ShortcutPickerDialog(onDismiss: () -> Unit, onSelect: (String) -> Unit) {
    Dialog(onDismissRequest = onDismiss) {
        Surface(shape = RoundedCornerShape(20.dp), color = Color.White, shadowElevation = 8.dp) {
            Column(
                modifier = Modifier.fillMaxWidth().padding(20.dp),
                horizontalAlignment = Alignment.CenterHorizontally
            ) {
                Text("추가할 항목 선택", fontSize = 18.sp, fontWeight = FontWeight.Bold,
                    color = Color.Black, modifier = Modifier.padding(bottom = 16.dp))
                Button(onClick = { onSelect("app_widget") },
                    modifier = Modifier.fillMaxWidth().padding(vertical = 4.dp)) { Text("앱 위젯") }
                Button(onClick = { onSelect("favorite_app") },
                    modifier = Modifier.fillMaxWidth().padding(vertical = 4.dp)) { Text("즐겨찾는 앱") }
                Button(onClick = { onSelect("text") },
                    modifier = Modifier.fillMaxWidth().padding(vertical = 4.dp)) { Text("글 넣기") }
                Spacer(modifier = Modifier.height(8.dp))
                TextButton(onClick = onDismiss) { Text("취소") }
            }
        }
    }
}

// ============================================================
// 앱 위젯 바텀시트
// ============================================================
@OptIn(ExperimentalMaterial3Api::class)
@Composable
fun AppWidgetBottomSheet(apps: List<AppItem>, onDismiss: () -> Unit, onAppSelected: (AppItem) -> Unit) {
    val sheetState = rememberModalBottomSheetState(skipPartiallyExpanded = false)
    ModalBottomSheet(onDismissRequest = onDismiss, sheetState = sheetState, containerColor = Color.White) {
        Column(modifier = Modifier.fillMaxWidth().padding(horizontal = 16.dp).padding(bottom = 24.dp)) {
            Text("앱 선택", fontSize = 20.sp, fontWeight = FontWeight.Bold,
                color = Color.Black, modifier = Modifier.padding(vertical = 12.dp))
            LazyVerticalGrid(
                columns = GridCells.Fixed(4),
                contentPadding = PaddingValues(vertical = 8.dp),
                modifier = Modifier.fillMaxWidth().heightIn(max = 400.dp)
            ) {
                items(apps) { app -> AppGridItem(app = app, onClick = { onAppSelected(app) }) }
            }
        }
    }
}

@Composable
fun AppGridItem(app: AppItem, onClick: () -> Unit) {
    Column(
        modifier = Modifier.fillMaxWidth().clickable(onClick = onClick)
            .padding(vertical = 12.dp, horizontal = 4.dp),
        horizontalAlignment = Alignment.CenterHorizontally
    ) {
        Box(
            modifier = Modifier.size(56.dp).clip(RoundedCornerShape(16.dp))
                .background(app.tint.copy(alpha = 0.15f)),
            contentAlignment = Alignment.Center
        ) {
            Icon(imageVector = app.icon, contentDescription = app.name,
                tint = app.tint, modifier = Modifier.size(30.dp))
        }
        Spacer(modifier = Modifier.height(6.dp))
        Text(text = app.name, fontSize = 12.sp, color = Color.Black,
            textAlign = TextAlign.Center, maxLines = 1)
    }
}

// ============================================================
// 추가된 앱 Row
// ============================================================
@Composable
fun AddedAppsRow(apps: List<AppItem>) {
    Row(
        modifier = Modifier.fillMaxWidth().padding(horizontal = 8.dp),
        horizontalArrangement = Arrangement.spacedBy(12.dp, Alignment.CenterHorizontally)
    ) {
        apps.take(8).forEach { app ->
            Column(horizontalAlignment = Alignment.CenterHorizontally) {
                Box(
                    modifier = Modifier.size(48.dp).clip(RoundedCornerShape(14.dp))
                        .background(Color.White.copy(alpha = 0.85f)),
                    contentAlignment = Alignment.Center
                ) {
                    Icon(imageVector = app.icon, contentDescription = app.name,
                        tint = app.tint, modifier = Modifier.size(26.dp))
                }
                Spacer(modifier = Modifier.height(4.dp))
                Text(text = app.name, fontSize = 10.sp, color = Color.White, maxLines = 1)
            }
        }
    }
}

