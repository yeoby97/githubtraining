class LockScreenActivity : ComponentActivity() {
    private lateinit var keyguardManager: KeyguardManager

    override fun onCreate(savedInstanceState: Bundle?) {
        super.onCreate(savedInstanceState)

        // Initialize keyguard manager
        keyguardManager = getSystemService(KEYGUARD_SERVICE) as KeyguardManager

        // Disable keyguard and turn on screen
        setShowWhenLocked(true)
        setTurnScreenOn(true)
        if (android.os.Build.VERSION.SDK_INT >= android.os.Build.VERSION_CODES.O_MR1) {
            keyguardManager.requestDismissKeyguard(this, null)
        }

        setContent {
            LockScreenTheme {
                Surface(
                    modifier = Modifier.fillMaxSize(),
                    color = MaterialTheme.colorScheme.background
                ) {
                    LockScreen(onUnlock = { unlockDevice() })
                }
            }
        }
    }

    private fun unlockDevice() {
        // In a real app, this would properly unlock the device
        Toast.makeText(this, "Device unlocked!", Toast.LENGTH_SHORT).show()
    }
}

@Composable
fun LockScreen(onUnlock: () -> Unit) {

    var isFloating by remember { mutableStateOf(false) }

    // 팝업 표시 여부
    var showShortcutPopup by remember { mutableStateOf(false) }

    // 드래그용 현재 위치
    var clockOffset by remember { mutableStateOf(Offset.Zero) }
    var greenBoxOffset by remember { mutableStateOf(Offset.Zero) }

    // 확인 시 저장 / 취소 시 복원할 위치 (시계만 저장. 초록색 바는 항상 제자리)
    var savedClockOffset by remember { mutableStateOf(Offset.Zero) }

    // 뒤로가기 → 원래 위치로 복원
    BackHandler(enabled = isFloating) {
        clockOffset = savedClockOffset
        greenBoxOffset = Offset.Zero
        isFloating = false
    }

    // 화면 크기 가져오기
    val configuration = LocalConfiguration.current
    val screenWidth = configuration.screenWidthDp.dp
    val screenHeight = configuration.screenHeightDp.dp
    val screenBig = if (screenWidth > screenHeight) screenWidth else screenHeight

    // 동적 패딩 값 계산 (화면 크기의 0.05배)
    val horizontalPadding = screenWidth * 0.05f
    val verticalPadding = screenHeight * 0.05f

    // 스케일 애니메이션 정의
    val scale by animateFloatAsState(
        targetValue = if (isFloating) 0.7f else 1f,
        animationSpec = tween(durationMillis = 500, easing = FastOutSlowInEasing),
        label = "scale"
    )

    // 패딩 애니메이션 정의
    val horizontalPaddingAnim by animateDpAsState(
        targetValue = if (isFloating) horizontalPadding else 0.dp,
        animationSpec = tween(durationMillis = 500, easing = FastOutSlowInEasing),
        label = "hPadding"
    )

    val verticalPaddingAnim by animateDpAsState(
        targetValue = if (isFloating) verticalPadding else 0.dp,
        animationSpec = tween(durationMillis = 500, easing = FastOutSlowInEasing),
        label = "vPadding"
    )

    // 모서리 둥글기 애니메이션 정의
    val cornerRadius by animateDpAsState(
        targetValue = if (isFloating) 30.dp else 0.dp,
        animationSpec = tween(durationMillis = 500, easing = FastOutSlowInEasing),
        label = "corner"
    )

    // 애니메이션 완료 상태 추적
    var animationFinished by remember { mutableStateOf(false) }
    LaunchedEffect(scale, horizontalPaddingAnim, verticalPaddingAnim) {
        val scaleTarget = if (isFloating) 0.7f else 1f
        val horizontalPaddingTarget = if (isFloating) horizontalPadding else 0.dp
        val verticalPaddingTarget = if (isFloating) verticalPadding else 0.dp

        val epsilon = 0.001f
        val scaleFinished = abs(scale - scaleTarget) < epsilon
        val horizontalPaddingFinished =
            abs(horizontalPaddingAnim.value - horizontalPaddingTarget.value) < epsilon
        val verticalPaddingFinished =
            abs(verticalPaddingAnim.value - verticalPaddingTarget.value) < epsilon

        animationFinished =
            scaleFinished && horizontalPaddingFinished && verticalPaddingFinished
    }

    Box(
        modifier = Modifier
            .fillMaxSize()
            .background(Color.White)
    ) {
        Box(
            modifier = Modifier
                .fillMaxSize()
                .graphicsLayer {
                    scaleX = scale
                    scaleY = scale
                    transformOrigin = TransformOrigin(0.5f, 0.2f)
                }
                .clip(RoundedCornerShape(cornerRadius))
                .background(Color.Magenta)
                .pointerInput(Unit) {
                    detectTapGestures(
                        onPress = {
                            val pressStartTime = System.currentTimeMillis()

                            val isReleased = try {
                                withTimeout(500) {
                                    tryAwaitRelease()
                                    true
                                }
                            } catch (e: TimeoutCancellationException) {
                                isFloating = true
                                false
                            }

                            if (!isFloating && isReleased &&
                                System.currentTimeMillis() - pressStartTime >= 500
                            ) {
                                isFloating = true
                            }
                        }
                    )
                }
        ) {
            Column(
                modifier = Modifier
                    .fillMaxSize()
                    .padding(16.dp),
                horizontalAlignment = Alignment.CenterHorizontally,
                verticalArrangement = Arrangement.SpaceBetween
            ) {
                // === 상단 영역: 버튼 Row + 시계/위젯 ===
                Column(
                    horizontalAlignment = Alignment.CenterHorizontally
                ) {
                    // 상단 버튼 (floating 일 때만)
                    if (isFloating) {
                        Row(
                            modifier = Modifier.fillMaxWidth(),
                            horizontalArrangement = Arrangement.SpaceBetween
                        ) {
                            Button(onClick = { /* TODO: 배경화면 변경 */ }) {
                                Text("배경화면")
                            }
                            Button(onClick = {
                                // 확인 → 시계 위치는 저장, 초록색 바는 원위치
                                savedClockOffset = clockOffset
                                greenBoxOffset = Offset.Zero
                                isFloating = false
                            }) {
                                Text("확인")
                            }
                        }
                    } else {
                        // 버튼 영역 자리 확보 (레이아웃 점프 방지)
                        Spacer(modifier = Modifier.height(48.dp))
                    }

                    Spacer(modifier = Modifier.height(screenHeight * 0.05f))

                    ClockAndWidget(
                        screenHeight = screenHeight,
                        screenBig = screenBig,
                        modifier = Modifier
                            .offset {
                                IntOffset(
                                    clockOffset.x.roundToInt(),
                                    clockOffset.y.roundToInt()
                                )
                            }
                            .pointerInput(isFloating) {
                                if (isFloating) {
                                    detectDragGestures { change, dragAmount ->
                                        change.consume()
                                        clockOffset += dragAmount
                                    }
                                }
                            }
                    )
                }

                // === 하단 영역: 초록색 바 (Galaxy Lock Star 처럼 하단에서 살짝 위) ===
                Box(
                    modifier = Modifier
                        .padding(bottom = screenHeight * 0.05f)
                        .offset {
                            IntOffset(
                                greenBoxOffset.x.roundToInt(),
                                greenBoxOffset.y.roundToInt()
                            )
                        }
                        // 드래그 (floating 일 때만)
                        .pointerInput(isFloating) {
                            if (isFloating) {
                                detectDragGestures { change, dragAmount ->
                                    change.consume()
                                    greenBoxOffset += dragAmount
                                }
                            }
                        }
                        // 탭 → 팝업 (floating 일 때만)
                        .pointerInput(isFloating) {
                            if (isFloating) {
                                detectTapGestures(
                                    onTap = { showShortcutPopup = true }
                                )
                            }
                        }
                        .clip(RoundedCornerShape(20.dp))
                        .border(
                            width = if (isFloating) 2.dp else 0.dp,
                            color = Color.LightGray,
                            shape = RoundedCornerShape(20.dp)
                        )
                        .height(50.dp)
                        .width(200.dp)
                        .background(Color.Green)
                )
            }
        }

        // === 팝업: 앱 위젯 / 즐겨찾는 앱 / 글 넣기 ===
        if (showShortcutPopup) {
            ShortcutPickerDialog(
                onDismiss = { showShortcutPopup = false },
                onSelect = { selected ->
                    showShortcutPopup = false
                    // TODO: 선택된 항목 처리
                    // selected: "app_widget" | "favorite_app" | "text"
                }
            )
        }
    }
}

@Composable
fun ShortcutPickerDialog(
    onDismiss: () -> Unit,
    onSelect: (String) -> Unit
) {
    Dialog(onDismissRequest = onDismiss) {
        Surface(
            shape = RoundedCornerShape(20.dp),
            color = Color.White,
            shadowElevation = 8.dp
        ) {
            Column(
                modifier = Modifier
                    .fillMaxWidth()
                    .padding(20.dp),
                horizontalAlignment = Alignment.CenterHorizontally
            ) {
                Text(
                    text = "추가할 항목 선택",
                    fontSize = 18.sp,
                    fontWeight = FontWeight.Bold,
                    color = Color.Black,
                    modifier = Modifier.padding(bottom = 16.dp)
                )

                Button(
                    onClick = { onSelect("app_widget") },
                    modifier = Modifier
                        .fillMaxWidth()
                        .padding(vertical = 4.dp)
                ) {
                    Text("앱 위젯")
                }
                Button(
                    onClick = { onSelect("favorite_app") },
                    modifier = Modifier
                        .fillMaxWidth()
                        .padding(vertical = 4.dp)
                ) {
                    Text("즐겨찾는 앱")
                }
                Button(
                    onClick = { onSelect("text") },
                    modifier = Modifier
                        .fillMaxWidth()
                        .padding(vertical = 4.dp)
                ) {
                    Text("글 넣기")
                }

                Spacer(modifier = Modifier.height(8.dp))

                TextButton(onClick = onDismiss) {
                    Text("취소")
                }
            }
        }
    }
}

@Composable
fun ClockAndWidget(
    screenHeight: Dp,
    screenBig: Dp,
    modifier: Modifier = Modifier
) {
    val floatModifier = Modifier
        .clip(RoundedCornerShape(20.dp))
        .border(width = 2.dp, color = Color.LightGray, shape = RoundedCornerShape(20.dp))
        .padding(10.dp)

    Column(
        modifier = modifier,
        horizontalAlignment = Alignment.CenterHorizontally
    ) {
        // 현재 시간 표시
        val timeFormat = SimpleDateFormat("hh:mm", Locale.getDefault())
        val currentTime = timeFormat.format(Calendar.getInstance().time)
        Text(
            text = currentTime,
            color = Color.White,
            fontSize = 48.sp,
            fontWeight = FontWeight.Bold
        )

        // 현재 날짜 표시
        val dateFormat = SimpleDateFormat("EEEE, MMMM dd", Locale.getDefault())
        val currentDate = dateFormat.format(Calendar.getInstance().time)
        Text(
            text = currentDate,
            color = Color.White,
            fontSize = 18.sp,
            modifier = Modifier.padding(top = 8.dp)
        )

        Spacer(modifier = Modifier.height(screenHeight * 0.02f))

        val widgetFloatModifier = Modifier
            .clip(RoundedCornerShape(20.dp))
            .border(width = 2.dp, color = Color.LightGray, shape = RoundedCornerShape(20.dp))
            .padding(5.dp)
            .width(screenBig * 0.25f)
            .height(screenHeight * 0.05f)

        Row(
            modifier = widgetFloatModifier,
            horizontalArrangement = Arrangement.Center
        ) {
            repeat(4) {
                Box(
                    modifier = Modifier
                        .then(floatModifier)
                        .height(screenHeight * 0.035f)
                        .width(screenHeight * 0.035f)
                        .background(Color.Yellow)
                )
            }
        }
    }
}

