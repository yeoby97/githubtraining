AI 답변 메신저로 받기
OpenClaw의 등장 
OpenClaw의 특징 – PC제어 가능, Local llm활용시 적은 비용, 토큰을 통해 원하는 다른 많은 앱들과 연결 가능.
유저층들의 주된 활용 – 스케쥴링으로 자동화 기능
그러나 다른 llm서비스도 해당 기능 보유.
Gpt, gemini, claude 모두 예약 및 반복동작 가능
예약, 반복동작을 했을 때 앱을 통해 동작 수행 알림을 받을 수 있음.
하지만 결과물에 조건을 걸어 조건부 알림을 받는건 실패.
그러나 mcp를 통한 메시지 앱과의 연결에서 차이가 있음.
우선 gemini는 메신저와 연결 실패. 대신 구글과 연동돼 메시지를 보낼 수 있는 기능이 있지만 전송시마다 확인버튼을 눌러줘야함.
Gpt는 telegram과 연동하는데 성공했지만 역시 전송시마다 확인버튼이 필요. 
그러나 claude의 경우에는 다시 묻지 않는 선택지가 존재.
이를 claude cowork나 code의 예약기능과 엮어 메신저로 결과물을 받을 수 있음.
여기에서 잠깐 우리가 집고 넘어갈게 메신저를 보낼때는 해당 mcp, 즉 도구를 활용한다는 점.
만약 내가 원할때만 메시지를 보내도록 한다면 특정 정보를 찾도록 루틴작업을 시키고 해당 정보를 찾았을 경우에만 메시지를 받는게 가능

