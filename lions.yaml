        super.onCreate(savedInstanceState)
        enableEdgeToEdge()
        setContent {
            MyApplicationTheme {

            }
        }
    }
}

@Preview(showBackground = true)
@Composable
fun MainScreen(){

    var boxVisible = remember { MutableTransitionState(false).apply {
        targetState = true
    }}

    val onClick = { newState : Boolean ->
        boxVisible.targetState = newState
    }

    Column(
        Modifier.padding(20.dp).fillMaxSize(),
        horizontalAlignment = Alignment.CenterHorizontally,
    ){
        Row(
            Modifier.fillMaxWidth(),
            horizontalArrangement = Arrangement.SpaceEvenly
        ) {
            CustomButton(text = "Show", targetState = true, onClick = onClick)
            CustomButton(text = "Hide", targetState = false, onClick = onClick)
        }

        Spacer(modifier = Modifier.height(20.dp))
        AnimatedVisibility(
            visible = boxVisible.currentState,
            enter = EnterTransition.None,
            exit = ExitTransition.None

        ) {
            Row{
                Box(modifier = Modifier.animateEnterExit(
                    enter = slideInVertically(animationSpec = tween(durationMillis = 5500)),
                    exit = ExitTransition.None
                )
                    .size(height=150.dp, width = 150.dp)
                    .background(Color.Blue)
                )
                Spacer(modifier = Modifier.width(20.dp))
                Box(modifier = Modifier.animateEnterExit(
                    enter = fadeIn(animationSpec = tween(durationMillis = 5500)),
                    exit = ExitTransition.None
                )
                    .size(height=150.dp, width = 150.dp)
                    .background(Color.Red)
                )
            }
        }
    }
}

@Composable
fun CustomButton(text : String, targetState : Boolean,
                 onClick : (Boolean) -> Unit,bgColor: Color = Color.Blue){
    Button(
        onClick = {onClick(targetState)},
        colors = ButtonDefaults.buttonColors(containerColor = bgColor),
    ) {
        Text(text)
    }
}
