회사에 처음 입소하여 전반적인 사업장 환경과 업무 공간을 익히는 시간을 가졌다.
먼저 사업장 내부 지리를 안내받으며 각 부서의 위치와 주요 시설의 용도를 파악하였고, 이를 통해 앞으로 인턴십 기간 동안 어떤 환경에서 근무하게 되는지 감을 잡을 수 있었다.
이어서 회사의 기본 소개를 들으며 기업의 주요 사업 분야, 운영 방식, 조직 구성 등에 대해 배웠다.
또한 인턴십 기간 동안 우리가 달성해야 할 목표와 수행하게 될 역할에 대한 설명도 함께 들었다.
이번 오리엔테이션을 통해 회사에 대한 전반적인 이해를 높일 수 있었고, 앞으로의 인턴십에 임하는 자세와 방향을 정리하는 데 도움이 되었다.
검증부서 파트장님께서 직접 방문하셔서 삼성 MX 부서 내에서 구미 사업장이 수행하는 역할과 중요성에 대해 상세하게 설명해 주셨다.
이를 통해 단순히 현장 실습을 수행하는 것이 아니라, 회사 전체 생산 및 운영 체계 속에서 구미 사업장이 어떤 위치를 차지하고 있는지 이해할 수 있었다. 
특히 파트장님께서는 자동화의 중요성을 여러 차례 강조하셨으며, 앞으로의 제조 환경에서는 AI를 활용한 완전 자동화 라인 구축이 핵심 과제가 될 것이라고 말씀하셨다. 
또한 이러한 방향성과 관련하여 우리가 인턴십 기간 동안 단순 보조 업무를 수행하는 것이 아니라, 자동화와 AI 활용 관점에서 문제를 바라보고 아이디어를 구체화하는 역할을 해야 한다는 점도 알려주셨다. 
이번 설명을 통해 회사가 지향하는 미래 방향을 보다 명확히 이해할 수 있었고, 인턴으로서 어떤 시각과 목표의식을 가지고 참여해야 하는지 생각해 보는 계기가 되었다.
회사 내부에 있는 제조, 검증, 메카 라인을 직접 견학하며 모바일 기기가 실제로 어떤 과정을 거쳐 생산되는지 배울 수 있었다. 
평소에는 완성된 제품만 접해왔기 때문에 제작 과정이 구체적으로 어떻게 이루어지는지 알기 어려웠는데, 이번 견학을 통해 부품 조립부터 검사, 
그리고 각 공정 간의 연계 방식까지 보다 현실적으로 이해할 수 있었다. 
특히 이전까지는 자동화 시스템에 대해 설명으로만 들었지만, 실제 현장에서 설비와 공정이 운영되는 모습을 보며 자동화가 생산성 향상과 품질 관리에 얼마나 중요한 역할을 하는지 체감할 수 있었다. 
또한 각 라인이 유기적으로 연결되어 운영되는 모습을 보면서 앞으로 남은 한 학기 동안 어떤 부분을 중점적으로 학습해야 할지에 대한 방향도 보다 명확하게 세울 수 있었다. 
이번 현장 견학은 이론과 실제를 연결해 보는 의미 있는 시간이었으며, 향후 학습 목표를 구체화하는 데 큰 도움이 되었다.
3월 13일 금요일에는 우리보다 먼저 입사한 선배들과 소통하는 시간을 가졌다. 이미 회사 생활을 경험하고 있는 선배들이었기 때문에 보다 현실적이고 구체적인 이야기를 들을 수 있었으며, 
공식적인 설명 시간에는 쉽게 묻기 어려웠던 회사 분위기, 업무 적응 과정, 필요한 역량, 입사 준비 방법 등에 대해서도 자유롭게 질문할 수 있었다. 
특히 우리와 크게 다르지 않은 시기에 같은 입장에서 출발했던 선배들의 경험담을 들으면서 회사 생활을 좀 더 가깝고 현실감 있게 이해할 수 있었다. 
또한 신입사원의 시선에서 느꼈던 어려움과 적응 방법, 준비해 두면 좋은 점들에 대한 조언을 들으며 내년 입사를 계획하는 데 큰 도움을 받을 수 있었다. 
이번 시간은 단순한 질의응답을 넘어 앞으로의 진로와 취업 준비 방향을 구체적으로 생각해 볼 수 있는 의미 있는 기회였다.Markdown 문법에 대해 학습하는 시간을 가졌다.
Markdown이 일반 텍스트 기반으로 문서를 작성한 뒤 HTML 형태로 변환할 수 있는 문법이라는 점을 이해하였고, 실제로 많이 사용되는 제목, 문단 구분, 인용문, 순서 있는 목록과 순서 없는 목록, 굵게 및 기울임 같은 강조 표현 방법을 익혔다. 또한 인라인 코드와 코드 블록 작성법, 링크와 이미지 삽입 방법, 줄바꿈과 특수문자 처리 방식도 함께 학습하였다. 
더불어 Markdown 문법만으로 표현하기 어려운 부분은 HTML 태그와 함께 사용할 수 있다는 점과 표 작성 및 정렬 방법까지 확인하면서 문서 작성의 활용 범위를 넓힐 수 있었다. 
이번 학습을 통해 Markdown이 단순하면서도 실용적인 문서 작성 도구라는 점을 알게 되었고, 앞으로 보고서 정리나 개발 문서 작성 시 유용하게 활용할 수 있을 것이라 느꼈다.
tidy data 개념에 대해 학습하였다. 데이터를 효과적으로 분석하고 활용하기 위해서는 먼저 데이터가 정돈된 형태로 구성되어 있어야 한다는 점을 이해할 수 있었다. 
특히 각 변수는 하나의 열로, 각 관측값은 하나의 행으로, 그리고 각 관측 단위는 하나의 테이블로 정리되어야 한다는 tidy data의 기본 원칙을 중심으로 학습하였다.
또한 정돈되지 않은 데이터와 정돈된 데이터의 차이를 비교해 보면서, 데이터 구조를 올바르게 정리하는 과정이 이후의 분석 효율성과 가독성에 큰 영향을 준다는 점도 알게 되었다.
이번 학습을 통해 단순히 데이터를 수집하는 것만 중요한 것이 아니라, 데이터를 목적에 맞게 체계적으로 정리하는 과정이 매우 중요하다는 것을 느꼈으며, 
앞으로 데이터 분석이나 문서 작성 과정에서도 이러한 원칙을 적극적으로 활용해야겠다고 생각하였다.공영주차장 이용현황 데이터를 불러와 컬럼 구조와 고유값,
결측치 여부를 우선 점검하였다. 이후 주소 데이터의 불필요한 표기 차이를 정리해 값을 통일하고, 주차일시를 날짜형으로 변환하여 요일 정보를 추가하였다. 
또한 주차장별 누락일을 확인하고 입차·출차대수에 대해 IQR 기준으로 이상치를 제거하였다. 마지막으로 주차장별 총 입차·출차량, 일평균 이용대수, 
구획당 평균 이용대수를 산출하고 이를 시각화하여 운영 현황을 비교·분석하였다.seaborn의 penguins 데이터셋을 활용해 데이터 전처리와 탐색적 데이터 분석, 
모델링까지 진행하였다. 먼저 결측치 분포를 확인한 뒤 수치형 변수는 중앙값, 범주형 변수는 최빈값으로 대체하였다. 
이후 IQR 기준으로 이상치를 처리하고 기술통계, 히스토그램, 박스플롯, 산점도, 상관관계 분석을 통해 변수 특성을 파악하였다. 
마지막으로 종(species)을 예측하기 위해 Logistic Regression과 Random Forest 모델을 학습·비교하고, 교차검증과 성능 평가를 통해 모델 결과를 정리하였다.
CNC 가공품질 예측을 위해 25개 기기의 센서 데이터와 검사 결과 데이터를 통합·분석하였다. 먼저 기기별 시계열 센서값에서 평균, 표준편차, 최솟값, 최댓값, 중앙값 등 통계 특성을 추출하고, 오차 및 절댓값 오차 기반 파생변수를 생성하였다. 
이후 상수 컬럼 제거, 인코딩, 스케일링을 수행한 뒤 LOO-CV 기반으로 Stage 1·Stage 2 파이프라인 모델을 비교·튜닝하였다. 최종적으로 핵심 특성만 선택한 SVM 기반 모델로 통합 정확도 88%를 달성하고 오분류 사례까지 분석하였다.
인공지능의 역사를 분석하며 1950년대 튜링 테스트와 다트머스 회의에서 시작된 \'기계가 생각할 수 있는가\'라는 철학적 질문이 어떻게 현대의 실천적 기술로 진화했는지 학습했습니다. 
