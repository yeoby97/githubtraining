@Composable
fun LockScreen(onUnlock: () -> Unit) {

    var isFloating by remember { mutableStateOf(false) }
    var showShortcutPopup by remember { mutableStateOf(false) }
    var showAppWidgetSheet by remember { mutableStateOf(false) }
    var addedApps by remember { mutableStateOf(listOf<AppItem>()) }

    // 미니 위젯 슬롯 상태 (4개, 기본값 세팅)
    var widgetSlots by remember {
        mutableStateOf<List<MiniWidget?>>(
            listOf(
                availableWidgets[0], // 날씨
                availableWidgets[1], // 걸음수
                availableWidgets[2], // 알람
                availableWidgets[3], // 배터리
            )
        )
    }
    var editingSlotIndex by remember { mutableStateOf(-1) }
    var showWidgetPicker by remember { mutableStateOf(false) }

    var clockOffset by remember { mutableStateOf(Offset.Zero) }
    var greenBoxOffset by remember { mutableStateOf(Offset.Zero) }
    var savedClockOffset by remember { mutableStateOf(Offset.Zero) }

    BackHandler(enabled = isFloating) {
        clockOffset = savedClockOffset
        greenBoxOffset = Offset.Zero
        isFloating = false
    }

    val configuration = LocalConfiguration.current
    val screenWidth = configuration.screenWidthDp.dp
    val screenHeight = configuration.screenHeightDp.dp
    val screenBig = if (screenWidth > screenHeight) screenWidth else screenHeight

    val horizontalPadding = screenWidth * 0.05f
    val verticalPadding = screenHeight * 0.05f

    val scale by animateFloatAsState(
        targetValue = if (isFloating) 0.7f else 1f,
        animationSpec = tween(500, easing = FastOutSlowInEasing), label = "scale"
    )
    val horizontalPaddingAnim by animateDpAsState(
        targetValue = if (isFloating) horizontalPadding else 0.dp,
        animationSpec = tween(500, easing = FastOutSlowInEasing), label = "hPadding"
    )
    val verticalPaddingAnim by animateDpAsState(
        targetValue = if (isFloating) verticalPadding else 0.dp,
        animationSpec = tween(500, easing = FastOutSlowInEasing), label = "vPadding"
    )
    val cornerRadius by animateDpAsState(
        targetValue = if (isFloating) 30.dp else 0.dp,
        animationSpec = tween(500, easing = FastOutSlowInEasing), label = "corner"
    )
    val blurRadius by animateDpAsState(
        targetValue = if (isFloating) 20.dp else 0.dp,
        animationSpec = tween(500, easing = FastOutSlowInEasing), label = "blur"
    )

    var animationFinished by remember { mutableStateOf(false) }
    LaunchedEffect(scale, horizontalPaddingAnim, verticalPaddingAnim) {
        val eps = 0.001f
        animationFinished = abs(scale - (if (isFloating) 0.7f else 1f)) < eps &&
                abs(horizontalPaddingAnim.value - (if (isFloating) horizontalPadding else 0.dp).value) < eps &&
                abs(verticalPaddingAnim.value - (if (isFloating) verticalPadding else 0.dp).value) < eps
    }

    Box(modifier = Modifier.fillMaxSize()) {

        // =====================================================
        // 바깥: 흐릿한 배경 (floating 시 blur)
        // =====================================================
        Image(
            painter = painterResource(id = R.drawable.images),
            contentDescription = null,
            contentScale = ContentScale.Crop,
            modifier = Modifier
                .fillMaxSize()
                .then(if (blurRadius > 0.dp) Modifier.blur(blurRadius) else Modifier)
        )

        // =====================================================
        // 안쪽: 정상 이미지 + 컨텐츠
        // =====================================================
        Box(
            modifier = Modifier
                .fillMaxSize()
                .graphicsLayer {
                    scaleX = scale
                    scaleY = scale
                    transformOrigin = TransformOrigin(0.5f, 0.2f)
                }
                .clip(RoundedCornerShape(cornerRadius))
                .pointerInput(Unit) {
                    detectTapGestures(
                        onPress = {
                            val pressStartTime = System.currentTimeMillis()
                            val isReleased = try {
                                withTimeout(500) { tryAwaitRelease(); true }
                            } catch (e: TimeoutCancellationException) {
                                isFloating = true; false
                            }
                            if (!isFloating && isReleased &&
                                System.currentTimeMillis() - pressStartTime >= 500
                            ) isFloating = true
                        }
                    )
                }
        ) {
            // 안쪽 정상 배경 이미지
            Image(
                painter = painterResource(id = R.drawable.images),
                contentDescription = null,
                contentScale = ContentScale.Crop,
                modifier = Modifier.fillMaxSize()
            )

            Column(
                modifier = Modifier.fillMaxSize().padding(16.dp),
                horizontalAlignment = Alignment.CenterHorizontally,
                verticalArrangement = Arrangement.SpaceBetween
            ) {
                // 상단: 버튼 + 시계 + 미니 위젯 슬롯 + 추가 앱
                Column(horizontalAlignment = Alignment.CenterHorizontally) {
                    if (isFloating) {
                        Row(
                            modifier = Modifier.fillMaxWidth(),
                            horizontalArrangement = Arrangement.SpaceBetween
                        ) {
                            Button(onClick = { /* TODO: 배경화면 */ }) { Text("배경화면") }
                            Button(onClick = {
                                savedClockOffset = clockOffset
                                greenBoxOffset = Offset.Zero
                                isFloating = false
                            }) { Text("확인") }
                        }
                    } else {
                        Spacer(modifier = Modifier.height(48.dp))
                    }

                    Spacer(modifier = Modifier.height(screenHeight * 0.05f))

                    // 시계 + 날짜 + 미니 위젯 슬롯
                    ClockWithWidgetSlots(
                        screenWidth = screenWidth,
                        screenHeight = screenHeight,
                        isFloating = isFloating,
                        widgetSlots = widgetSlots,
                        onSlotClick = { index ->
                            editingSlotIndex = index
                            showWidgetPicker = true
                        },
                        modifier = Modifier
                            .offset {
                                IntOffset(clockOffset.x.roundToInt(), clockOffset.y.roundToInt())
                            }
                            .pointerInput(isFloating) {
                                if (isFloating) {
                                    detectDragGestures { change, dragAmount ->
                                        change.consume()
                                        clockOffset += dragAmount
                                    }
                                }
                            }
                    )

                    if (addedApps.isNotEmpty()) {
                        Spacer(modifier = Modifier.height(screenHeight * 0.03f))
                        AddedAppsRow(apps = addedApps)
                    }
                }

                // 하단: 초록색 바
                Box(
                    modifier = Modifier
                        .padding(bottom = screenHeight * 0.05f)
                        .offset {
                            IntOffset(greenBoxOffset.x.roundToInt(), greenBoxOffset.y.roundToInt())
                        }
                        .pointerInput(isFloating) {
                            if (isFloating) {
                                detectDragGestures { change, dragAmount ->
                                    change.consume()
                                    greenBoxOffset += dragAmount
                                }
                            }
                        }
                        .pointerInput(isFloating) {
                            if (isFloating) {
                                detectTapGestures(onTap = { showShortcutPopup = true })
                            }
                        }
                        .clip(RoundedCornerShape(20.dp))
                        .border(
                            width = if (isFloating) 2.dp else 0.dp,
                            color = Color.LightGray,
                            shape = RoundedCornerShape(20.dp)
                        )
                        .height(50.dp)
                        .width(200.dp)
                        .background(Color.Green)
                )
            }
        }

        // 항목 선택 팝업
        if (showShortcutPopup) {
            ShortcutPickerDialog(
                onDismiss = { showShortcutPopup = false },
                onSelect = { selected ->
                    showShortcutPopup = false
                    when (selected) {
                        "app_widget" -> showAppWidgetSheet = true
                        "favorite_app" -> { }
                        "text" -> { }
                    }
                }
            )
        }

        // 앱 위젯 바텀시트
        if (showAppWidgetSheet) {
            AppWidgetBottomSheet(
                apps = defaultAppList,
                onDismiss = { showAppWidgetSheet = false },
                onAppSelected = { app ->
                    if (addedApps.none { it.id == app.id }) addedApps = addedApps + app
                    showAppWidgetSheet = false
                }
            )
        }

        // 미니 위젯 선택 바텀시트
        if (showWidgetPicker) {
            MiniWidgetPickerSheet(
                widgets = availableWidgets,
                currentWidget = widgetSlots.getOrNull(editingSlotIndex),
                onDismiss = { showWidgetPicker = false },
                onWidgetSelected = { widget ->
                    widgetSlots = widgetSlots.toMutableList().also { list ->
                        if (editingSlotIndex in list.indices) list[editingSlotIndex] = widget
                    }
                    showWidgetPicker = false
                },
                onRemove = {
                    widgetSlots = widgetSlots.toMutableList().also { list ->
                        if (editingSlotIndex in list.indices) list[editingSlotIndex] = null
                    }
                    showWidgetPicker = false
                }
            )
        }
    }
}

// ============================================================
// 시계 + 날짜 + 미니 위젯 슬롯
// ============================================================
@Composable
fun ClockWithWidgetSlots(
    screenWidth: Dp,
    screenHeight: Dp,
    isFloating: Boolean,
    widgetSlots: List<MiniWidget?>,
    onSlotClick: (Int) -> Unit,
    modifier: Modifier = Modifier
) {
    Column(
        modifier = modifier,
        horizontalAlignment = Alignment.CenterHorizontally
    ) {
        // 시간
        val timeFormat = SimpleDateFormat("hh:mm", Locale.getDefault())
        Text(
            text = timeFormat.format(Calendar.getInstance().time),
            color = Color.White,
            fontSize = 64.sp,
            fontWeight = FontWeight.Light,
            letterSpacing = (-2).sp
        )

        // 날짜
        val dateFormat = SimpleDateFormat("M월 d일 EEEE", Locale.KOREAN)
        Text(
            text = dateFormat.format(Calendar.getInstance().time),
            color = Color.White.copy(alpha = 0.9f),
            fontSize = 16.sp,
            modifier = Modifier.padding(top = 2.dp)
        )

        Spacer(modifier = Modifier.height(16.dp))

        // ── 미니 위젯 슬롯 4개 ──
        val slotSize = (screenWidth - 32.dp - 12.dp * 3) / 4  // 패딩·간격 제외 후 4등분

        Row(
            horizontalArrangement = Arrangement.spacedBy(8.dp),
            verticalAlignment = Alignment.CenterVertically
        ) {
            widgetSlots.forEachIndexed { index, widget ->
                MiniWidgetSlot(
                    widget = widget,
                    slotSize = slotSize,
                    isFloating = isFloating,
                    onClick = { onSlotClick(index) }
                )
            }
        }
    }
}

// ============================================================
// 미니 위젯 슬롯 하나
// ============================================================
@Composable
fun MiniWidgetSlot(
    widget: MiniWidget?,
    slotSize: Dp,
    isFloating: Boolean,
    onClick: () -> Unit
) {
    Box(
        modifier = Modifier
            .size(slotSize)
            .clip(RoundedCornerShape(18.dp))
            .background(Color.White.copy(alpha = if (isFloating) 0.3f else 0.2f))
            .then(
                if (isFloating) Modifier.border(
                    width = 1.5.dp,
                    color = Color.White.copy(alpha = 0.6f),
                    shape = RoundedCornerShape(18.dp)
                ) else Modifier
            )
            .clickable(enabled = isFloating, onClick = onClick),
        contentAlignment = Alignment.Center
    ) {
        if (widget != null) {
            // 위젯 내용
            Column(
                horizontalAlignment = Alignment.CenterHorizontally,
                verticalArrangement = Arrangement.Center,
                modifier = Modifier.padding(6.dp)
            ) {
                Icon(
                    imageVector = widget.icon,
                    contentDescription = widget.name,
                    tint = widget.iconTint,
                    modifier = Modifier.size(20.dp)
                )
                Spacer(modifier = Modifier.height(3.dp))
                Text(
                    text = widget.value,
                    color = Color.White,
                    fontSize = 13.sp,
                    fontWeight = FontWeight.Bold,
                    textAlign = TextAlign.Center,
                    maxLines = 1,
                    overflow = TextOverflow.Ellipsis
                )
                Text(
                    text = widget.label,
                    color = Color.White.copy(alpha = 0.75f),
                    fontSize = 10.sp,
                    textAlign = TextAlign.Center,
                    maxLines = 1,
                    overflow = TextOverflow.Ellipsis
                )
            }
        } else {
            // 빈 슬롯: floating일 때 + 아이콘
            if (isFloating) {
                Icon(
                    imageVector = Icons.Filled.Add,
                    contentDescription = "위젯 추가",
                    tint = Color.White.copy(alpha = 0.7f),
                    modifier = Modifier.size(22.dp)
                )
            }
        }
    }
}

// ============================================================
// 미니 위젯 선택 바텀시트
// ============================================================
@OptIn(ExperimentalMaterial3Api::class)
@Composable
fun MiniWidgetPickerSheet(
    widgets: List<MiniWidget>,
    currentWidget: MiniWidget?,
    onDismiss: () -> Unit,
    onWidgetSelected: (MiniWidget) -> Unit,
    onRemove: () -> Unit
) {
    val sheetState = rememberModalBottomSheetState(skipPartiallyExpanded = true)

    ModalBottomSheet(
        onDismissRequest = onDismiss,
        sheetState = sheetState,
        containerColor = Color(0xFF1C1C1E)
    ) {
        Column(
            modifier = Modifier
                .fillMaxWidth()
                .padding(horizontal = 16.dp)
                .padding(bottom = 32.dp)
        ) {
            Text(
                text = "위젯 선택",
                fontSize = 20.sp,
                fontWeight = FontWeight.Bold,
                color = Color.White,
                modifier = Modifier.padding(vertical = 12.dp)
            )

            LazyVerticalGrid(
                columns = GridCells.Fixed(4),
                contentPadding = PaddingValues(vertical = 8.dp),
                horizontalArrangement = Arrangement.spacedBy(10.dp),
                verticalArrangement = Arrangement.spacedBy(10.dp),
                modifier = Modifier
                    .fillMaxWidth()
                    .heightIn(max = 320.dp)
            ) {
                items(widgets) { widget ->
                    val isSelected = currentWidget?.id == widget.id
                    Column(
                        modifier = Modifier
                            .clip(RoundedCornerShape(14.dp))
                            .background(
                                if (isSelected) widget.iconTint.copy(alpha = 0.3f)
                                else Color.White.copy(alpha = 0.1f)
                            )
                            .border(
                                width = if (isSelected) 2.dp else 0.dp,
                                color = if (isSelected) widget.iconTint else Color.Transparent,
                                shape = RoundedCornerShape(14.dp)
                            )
                            .clickable { onWidgetSelected(widget) }
                            .padding(vertical = 10.dp, horizontal = 4.dp),
                        horizontalAlignment = Alignment.CenterHorizontally
                    ) {
                        Icon(
                            imageVector = widget.icon,
                            contentDescription = widget.name,
                            tint = widget.iconTint,
                            modifier = Modifier.size(26.dp)
                        )
                        Spacer(modifier = Modifier.height(4.dp))
                        Text(
                            text = widget.value,
                            color = Color.White,
                            fontSize = 13.sp,
                            fontWeight = FontWeight.Bold,
                            textAlign = TextAlign.Center
                        )
                        Text(
                            text = widget.name,
                            color = Color.White.copy(alpha = 0.65f),
                            fontSize = 10.sp,
                            textAlign = TextAlign.Center,
                            maxLines = 1
                        )
                    }
                }
            }

            // 현재 위젯이 있으면 제거 버튼
            if (currentWidget != null) {
                Spacer(modifier = Modifier.height(12.dp))
                TextButton(
                    onClick = onRemove,
                    modifier = Modifier.align(Alignment.CenterHorizontally)
                ) {
                    Text("위젯 제거", color = Color(0xFFFF453A), fontSize = 15.sp)
                }
            }
        }
    }
}

