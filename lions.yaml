class LockScreenActivity : ComponentActivity() {
    private lateinit var keyguardManager: KeyguardManager
    
    override fun onCreate(savedInstanceState: Bundle?) {
        super.onCreate(savedInstanceState)
        
        // Initialize keyguard manager
        keyguardManager = getSystemService(KEYGUARD_SERVICE) as KeyguardManager
        
        // Disable keyguard and turn on screen
        setShowWhenLocked(true)
        setTurnScreenOn(true)
        if (android.os.Build.VERSION.SDK_INT >= android.os.Build.VERSION_CODES.O_MR1) {
            keyguardManager.requestDismissKeyguard(this, null)
        }
        
        setContent {
            LockScreenTheme {
                Surface(
                    modifier = Modifier.fillMaxSize(),
                    color = MaterialTheme.colorScheme.background
                ) {
                    LockScreen(onUnlock = { unlockDevice() })
                }
            }
        }
    }
    
    private fun unlockDevice() {
        // In a real app, this would properly unlock the device
        // For this demo, we'll just show a toast
        Toast.makeText(this, "Device unlocked!", Toast.LENGTH_SHORT).show()
    }
}

@Composable
fun LockScreen(onUnlock: () -> Unit) {

    var isFloating by remember { mutableStateOf(false) }
// 드래그용 현재 위치
    var clockOffset by remember { mutableStateOf(Offset.Zero) }
    var greenBoxOffset by remember { mutableStateOf(Offset.Zero) }
// 확인 시 저장 / 취소 시 복원할 위치
    var savedClockOffset by remember { mutableStateOf(Offset.Zero) }
    var savedGreenBoxOffset by remember { mutableStateOf(Offset.Zero) }

// 뒤로가기 → 원래 위치로 복원
    BackHandler(enabled = isFloating) {
        clockOffset = savedClockOffset
        greenBoxOffset = savedGreenBoxOffset
        isFloating = false
    }
    // 화면 크기 가져오기
    val configuration = LocalConfiguration.current
    val screenWidth = configuration.screenWidthDp.dp
    val screenHeight = configuration.screenHeightDp.dp
    val screenSmall = if(screenWidth > screenHeight) screenHeight else screenWidth
    val screenBig = if(screenWidth > screenHeight) screenWidth else screenHeight
    // 동적 패딩 값 계산 (화면 크기의 0.05배)
    val horizontalPadding = screenWidth * 0.05f
    val verticalPadding = screenHeight * 0.05f
    // 스케일 애니메이션 정의
    val scale by animateFloatAsState(
        targetValue = if (isFloating) 0.7f else 1f,
        animationSpec = tween(
            durationMillis = 500,
            easing = FastOutSlowInEasing
        )
    )
    
    // 패딩 애니메이션 정의
    val horizontalPaddingAnim by animateDpAsState(
        targetValue = if (isFloating) horizontalPadding else 0.dp,
        animationSpec = tween(
            durationMillis = 500,
            easing = FastOutSlowInEasing
        )
    )
    
    val verticalPaddingAnim by animateDpAsState(
        targetValue = if (isFloating) verticalPadding else 0.dp,
        animationSpec = tween(
            durationMillis = 500,
            easing = FastOutSlowInEasing
        )
    )
    
    // 모서리 둥글기 애니메이션 정의
    val cornerRadius by animateDpAsState(
        targetValue = if (isFloating) 30.dp else 0.dp,
        animationSpec = tween(
            durationMillis = 500,
            easing = FastOutSlowInEasing
        )
    )
    
    // 애니메이션 완료 상태 추적
    var animationFinished by remember { mutableStateOf(false) }
    LaunchedEffect(scale, horizontalPaddingAnim, verticalPaddingAnim) {
        // 스케일과 패딩이 모두 목표값에 도달했는지 확인
        val scaleTarget = if (isFloating) 0.7f else 1f
        val horizontalPaddingTarget = if (isFloating) horizontalPadding else 0.dp
        val verticalPaddingTarget = if (isFloating) verticalPadding else 0.dp

        // 허용 오차 (tolerance)를 사용하여 부동소수점 비교
        val epsilon = 0.001f
        val scaleFinished = abs(scale - scaleTarget) < epsilon
        val horizontalPaddingFinished = abs(horizontalPaddingAnim.value - horizontalPaddingTarget.value) < epsilon
        val verticalPaddingFinished = abs(verticalPaddingAnim.value - verticalPaddingTarget.value) < epsilon

        animationFinished = scaleFinished && horizontalPaddingFinished && verticalPaddingFinished
    }
    
    Box(
        modifier = Modifier
            .fillMaxSize()
            .background(Color.White)
    ) {
        Box(
            modifier = Modifier
                .fillMaxSize()
                .graphicsLayer {
                    scaleX = scale
                    scaleY = scale
                    transformOrigin = TransformOrigin(0.5f, 0.2f)
                }
                .clip(RoundedCornerShape(cornerRadius))
                .background(Color.Magenta)
                .pointerInput(Unit) {
                    detectTapGestures(
                        onPress = {
                            val pressStartTime = System.currentTimeMillis()

                            // Launch a coroutine to check for long press
                            val isReleased = try {
                                withTimeout(500) {
                                    tryAwaitRelease()
                                    true
                                }
                            } catch (e: TimeoutCancellationException) {
                                isFloating = true
                                false
                            }

                            if (!isFloating && isReleased && System.currentTimeMillis() - pressStartTime >= 500) {
                                isFloating = true
                            }
                        }
                    )
                }
        ) {
            Column(
                modifier = Modifier
                    .fillMaxSize()
                    .padding(16.dp),
                horizontalAlignment = Alignment.CenterHorizontally,
                verticalArrangement = Arrangement.SpaceBetween
            ) {
                // Show additional content when animation is finished
                Column(
                    horizontalAlignment = Alignment.CenterHorizontally,
                    verticalArrangement = Arrangement.Center
                ) {
                    Row(
                        modifier = Modifier.fillMaxWidth().visible(isFloating),
                        horizontalArrangement = Arrangement.SpaceBetween
                    ) {
                        Button(
                            onClick = {
                            }
                        ) {
                            Text("배경화면")
                        }
                        Button(onClick = {
                            savedClockOffset = clockOffset
                            savedGreenBoxOffset = greenBoxOffset
                            isFloating = false
                        }) { Text("확인") }
                    }
                    Spacer(
                        modifier = Modifier.height(screenHeight * 0.1f)
                    )
                    ClockAndWidget(
                        screenHeight = screenHeight,
                        screenWidth = screenWidth,
                        screenBig = screenBig,
                        isFloating = isFloating,
                        modifier = Modifier
                            .offset { IntOffset(clockOffset.x.roundToInt(), clockOffset.y.roundToInt()) }
                            .pointerInput(isFloating) {
                                if (isFloating) {
                                    detectDragGestures { change, dragAmount ->
                                        change.consume()
                                        clockOffset += dragAmount
                                    }
                                }
                            }
                    )
                    val floatModifier = Modifier.clip(RoundedCornerShape(20.dp)) // 모서리를 둥글게 (20.dp 반경)
                        .border(width = 2.dp, color = Color.LightGray, shape = RoundedCornerShape(20.dp)) // 테두리 추가
                        .padding(10.dp)
                    Spacer(modifier=Modifier.height(screenHeight * 0.4f))
                    Box(
                        modifier = Modifier
                            .offset { IntOffset(greenBoxOffset.x.roundToInt(), greenBoxOffset.y.roundToInt()) }
                            .pointerInput(isFloating) {
                                if (isFloating) {
                                    detectDragGestures { change, dragAmount ->
                                        change.consume()
                                        greenBoxOffset += dragAmount
                                    }
                                }
                            }
                            .then(floatModifier)
                            .height(50.dp)
                            .width(200.dp)
                            .background(Color.Green)
                    ) {}
                }
            }
        }
    }
}

@Composable
fun ClockAndWidget(
    screenHeight: Dp,
    screenWidth: Dp,
    screenBig: Dp,
    isFloating: Boolean,
    modifier: Modifier = Modifier
){
    val floatModifier = Modifier.clip(RoundedCornerShape(20.dp)) // 모서리를 둥글게 (20.dp 반경)
        .border(width = 2.dp, color = Color.LightGray, shape = RoundedCornerShape(20.dp)) // 테두리 추가
        .padding(10.dp)
    val normalModifier = Modifier
        .padding(10.dp)

    Column(
        modifier = modifier,
        horizontalAlignment = Alignment.CenterHorizontally
    ){
        // 현재 시간 표시
        val locale = LocalLocale.current
        val timeFormat = SimpleDateFormat("hh:mm", Locale.getDefault())
        val currentTime = timeFormat.format(Calendar.getInstance().time)
        Text(
            text = currentTime,
            color = Color.White,
            fontSize = 48.sp,
            fontWeight = FontWeight.Bold
        )

        // 현재 날짜 표시
        val dateFormat = SimpleDateFormat("EEEE, MMMM dd", Locale.getDefault())
        val currentDate = dateFormat.format(Calendar.getInstance().time)
        Text(
            text = currentDate,
            color = Color.White,
            fontSize = 18.sp,
            modifier = Modifier.padding(top = 8.dp)
        )
        Spacer(modifier = Modifier.height(screenHeight * 0.02f))
        val widgetFloatModifier = Modifier.clip(RoundedCornerShape(20.dp)) // 모서리를 둥글게 (20.dp 반경)
            .border(width = 2.dp, color = Color.LightGray, shape = RoundedCornerShape(20.dp)) // 테두리 추가
            .padding(5.dp)
            .width(screenBig * 0.25f)
            .height(screenHeight * 0.05f)
        Row(
            modifier = widgetFloatModifier,
            horizontalArrangement = Arrangement.Center,
        ){
            Box(
                modifier = Modifier
                    .then(floatModifier)
                    .height(screenHeight * 0.035f)
                    .width(screenHeight * 0.035f)
                    .background(Color.Yellow)){
            }
            Box(
                modifier = Modifier
                    .then(floatModifier)
                    .height(screenHeight * 0.035f)
                    .width(screenHeight * 0.035f)
                    .background(Color.Yellow)){
            }
            Box(
                modifier = Modifier
                    .then(floatModifier)
                    .height(screenHeight * 0.035f)
                    .width(screenHeight * 0.035f)
                    .background(Color.Yellow)){
            }
            Box(
                modifier = Modifier
                    .then(floatModifier)
                    .height(screenHeight * 0.035f)
                    .width(screenHeight * 0.035f)
                    .background(Color.Yellow)){
            }
        }
    }
}


